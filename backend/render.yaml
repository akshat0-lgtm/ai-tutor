# Render Blueprint — lets you deploy the backend by pointing Render at this repo.
# (You can also configure these same settings by hand in the Render dashboard.)
services:
  - type: web
    name: ai-tutor-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false        # set this secret in the Render dashboard
      - key: SARVAM_API_KEY
        sync: false        # optional — enables Teach mode's voice conversation feature
      - key: CORS_ORIGINS
        sync: false        # set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.9
